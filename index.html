<!DOCTYPE html>
<html>
<head>
  <title>📢 Complaint Menu</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<script>
if (localStorage.getItem("login") !== "true") location.href="login.html";
</script>

<header class="header">
  <h1>📢 Complaint Menu</h1>
  <nav>
    <button onclick="route('home')">🏠</button>
    <button onclick="route('dashboard')">📊</button>
    <button onclick="route('profile')">👤</button>
    <button onclick="route('contact')">📞</button>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="logout()">🚪</button>
  </nav>
</header>

<main>
  <!-- HOME -->
  <section id="home">
    <div class="card form">
      <h3>Add Complaint</h3>
      <input id="title" placeholder="Title">
      <textarea id="desc" placeholder="Description"></textarea>
      <select id="priority">
        <option>Low</option><option>Medium</option><option>High</option>
      </select>
      <button onclick="addComplaint()">Add</button>
    </div>

    <div class="card toolbar">
      <input id="search" placeholder="🔍 search..." oninput="applyFilters()">
      <select id="filterStatus" onchange="applyFilters()">
        <option value="">All</option>
        <option>Pending</option>
        <option>Solved</option>
      </select>
    </div>

    <div id="list" class="grid"></div>
  </section>

  <!-- DASHBOARD -->
  <section id="dashboard" class="hide">
    <div class="card">
      <h3>📊 Dashboard</h3>
      <p>Total: <b id="total"></b></p>
      <p>Pending: <b id="pending"></b></p>
      <p>Solved: <b id="solved"></b></p>
      <canvas id="chart"></canvas>
    </div>
  </section>

  <!-- PROFILE -->
  <section id="profile" class="hide">
    <div class="card">
      <h3>👤 Profile</h3>
      <input id="pname" placeholder="Name">
      <input id="pemail" placeholder="Email">
      <button onclick="saveProfile()">Save</button>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="hide">
    <div class="card">
      <h3>📞 Contact</h3>
      <textarea id="msg" placeholder="Message..."></textarea>
      <button onclick="sendMsg()">Send</button>
      <div id="toast"></div>
    </div>
  </section>
</main>

<script src="store.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>
</body>
</html>
