<!DOCTYPE html>
<html>
<head>
    <title>📢 Complaint Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
if (localStorage.getItem("login") !== "true") {
    window.location.href = "login.html";
}
</script>

<!-- HEADER -->
<div class="header">
    <h1 class="logo">📢 Complaint Menu</h1>

    <div class="nav">
        <button onclick="showPage('home')">🏠</button>
        <button onclick="showPage('about')">ℹ️</button>
        <button onclick="showPage('dashboard')">📊</button>
        <button onclick="toggleTheme()">🌙</button>
        <button onclick="logout()">🚪</button>
    </div>
</div>

<!-- HOME -->
<div id="homePage">

<div class="form glass">
    <h3>Add Complaint</h3>
    <input id="title" placeholder="Complaint Title">
    <textarea id="desc" placeholder="Enter complaint..."></textarea>
    <button onclick="addComplaint()">🚀 Submit</button>
</div>

<input id="search" placeholder="🔍 Search..." onkeyup="searchComplaint()">

<div id="list" class="grid"></div>

</div>

<!-- ABOUT -->
<div id="aboutPage" style="display:none;">
    <div class="about-box">
        <h3>About Project</h3>
        <p>This is a modern Complaint Menu system.</p>
        <ul>
            <li>Add / Delete complaints</li>
            <li>Search complaints</li>
            <li>Status tracking</li>
            <li>Dark mode</li>
        </ul>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" style="display:none;">
    <div class="about-box">
        <h3>📊 Dashboard</h3>

        <p>Total: <span id="total"></span></p>
        <p>Pending: <span id="pending"></span></p>
        <p>Solved: <span id="solved"></span></p>
    </div>
</div>

<script src="storage.js"></script>
<script src="script.js"></script>

</body>
</html>
