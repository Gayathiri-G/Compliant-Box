<!DOCTYPE html>
<html>
<head>
    <title>📢 Complaint Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
if (localStorage.getItem("login") !== "true") {
    window.location.href = "login.html";
}
</script>

<!-- HEADER -->
<div class="header">
    <h1>📢 Complaint Menu</h1>

    <div>
        <button onclick="showPage('home')">🏠</button>
        <button onclick="showPage('about')">ℹ️</button>
        <button onclick="showPage('dashboard')">📊</button>
        <button onclick="toggleTheme()">🌙</button>
        <button onclick="logout()">🚪</button>
    </div>
</div>

<!-- HOME -->
<div id="homePage">
    <div class="form">
        <h3>Add Complaint</h3>
        <input id="title" placeholder="Complaint Title"><br>
        <textarea id="desc" placeholder="Enter complaint..."></textarea><br>
        <button onclick="addComplaint()">Submit</button>
    </div>

    <input id="search" placeholder="Search..." onkeyup="searchComplaint()">

    <div id="list"></div>
</div>

<!-- ABOUT -->
<div id="aboutPage" style="display:none;">
    <div class="about-box">
        <h3>About Project</h3>
        <p>This is a Complaint Menu system with dashboard.</p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" style="display:none;">
    <div class="about-box">
        <h3>📊 Dashboard</h3>
        <p>Total: <span id="total">0</span></p>
        <p>Pending: <span id="pending">0</span></p>
        <p>Solved: <span id="solved">0</span></p>
    </div>
</div>

<script src="storage.js"></script>
<script src="script.js"></script>

</body>
</html>
