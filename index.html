<!DOCTYPE html>
<html>
<head>
    <title>📢 Complaint Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
if (localStorage.getItem("login") !== "true") {
    window.location.href = "login.html";
}
</script>

<!-- 🔝 Header -->
<div class="header">
    <h1>📢 Complaint Menu</h1>

    <div>
        <button onclick="showPage('home')">🏠 Home</button>
        <button onclick="showPage('about')">ℹ️ About</button>
        <button onclick="toggleTheme()">🌙 Theme</button>
        <button onclick="logout()">🚪 Logout</button>
    </div>
</div>

<!-- 📝 HOME PAGE -->
<div id="homePage">

    <div class="form">
        <h3>Add Complaint</h3>
        <input id="title" placeholder="Complaint Title"><br>
        <textarea id="desc" placeholder="Enter complaint..."></textarea><br>
        <button onclick="addComplaint()">Submit</button>
    </div>

    <input id="search" placeholder="Search complaints..." onkeyup="searchComplaint()">

    <div id="list"></div>

</div>

<!-- ℹ️ ABOUT PAGE -->
<div id="aboutPage" style="display:none;">

    <div class="about-box">
        <h3>About This Project</h3>
        <p>This is a Digital Complaint Menu system.</p>

        <ul>
            <li>Add complaints</li>
            <li>Search complaints</li>
            <li>Delete complaints</li>
            <li>Dark/Light theme</li>
        </ul>

        <p>Built using HTML, CSS, JavaScript and deployed using Jenkins CI/CD.</p>
    </div>

</div>

<script src="storage.js"></script>
<script src="script.js"></script>

</body>
</html>
