<!DOCTYPE html>
<html>
<head>
<title>📢 Complaint Box</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<script>
if(localStorage.getItem("login")!=="true") location="login.html";
</script>

<header class="header">
<h1>📢 Complaint Box</h1>

<nav>
<button onclick="route('home')">🏠</button>
<button onclick="route('dashboard')">📊</button>
<button onclick="route('profile')">👤</button>
<button onclick="route('contact')">📞</button>
<button onclick="route('history')">📜</button>
<button onclick="route('settings')">⚙️</button>
<button onclick="route('help')">❓</button>
<button onclick="toggleTheme()">🌙</button>
<button onclick="logout()">🚪</button>
</nav>
</header>

<!-- HOME -->
<section id="home">
<div class="card">
<input id="title" placeholder="Title">
<textarea id="desc" placeholder="Description"></textarea>
<select id="priority">
<option>Low</option><option>Medium</option><option>High</option>
</select>
<button onclick="addComplaint()">Add</button>
</div>

<div class="card">
<input id="search" placeholder="Search..." oninput="applyFilters()">
<select id="filterStatus" onchange="applyFilters()">
<option value="">All</option>
<option>Pending</option>
<option>Solved</option>
</select>
</div>

<div id="list" class="grid"></div>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="hide">
<div class="card">
<h3>📊 Dashboard</h3>
<p>Total: <b id="total"></b></p>
<p>Pending: <b id="pending"></b></p>
<p>Solved: <b id="solved"></b></p>
<canvas id="barChart"></canvas>
<canvas id="pieChart"></canvas>
</div>
</section>

<!-- PROFILE -->
<section id="profile" class="hide">
<div class="card">
<h3>👤 Profile</h3>
<input id="pname" placeholder="Name">
<input id="pemail" placeholder="Email">
<button onclick="saveProfile()">Save</button>
</div>
</section>

<!-- CONTACT -->
<section id="contact" class="hide">
<div class="card">
<h3>📞 Contact</h3>
<textarea id="msg"></textarea>
<button onclick="sendMsg()">Send</button>
</div>
</section>

<!-- HISTORY -->
<section id="history" class="hide">
<div class="card">
<h3>📜 History</h3>
<div id="historyList"></div>
</div>
</section>

<!-- SETTINGS -->
<section id="settings" class="hide">
<div class="card">
<h3>⚙️ Settings</h3>
<button onclick="toggleTheme()">🌙 Dark Mode</button>
<button onclick="clearData()">🗑 Clear Data</button>
</div>
</section>

<!-- HELP -->
<section id="help" class="hide">
<div class="card">
<h3>❓ Help</h3>
<p>Add complaint → click Add</p>
<p>Solve → ✔</p>
<p>Delete → ❌</p>
</div>
</section>

<div id="toast" class="toast"></div>

<script src="store.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>
</body>
</html>
