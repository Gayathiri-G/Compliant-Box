<!DOCTYPE html>
<html>
<head>
    <title>📢 Complaint Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 Login Protection -->
<script>
if (localStorage.getItem("login") !== "true") {
    window.location.href = "login.html";
}
</script>

<!-- 🔝 Header -->
<div class="header">
    <h1 class="title">📢 Complaint Menu</h1>


    <div>
        <button onclick="toggleTheme()">🌙 Theme</button>
        <button onclick="logout()">🚪 Logout</button>
    </div>
</div>
<!-- 📝 Add Complaint -->
<div class="form">
    <h3>Add Complaint</h3>
    <input id="title" placeholder="Complaint Title"><br>
    <textarea id="desc" placeholder="Enter complaint..."></textarea><br>
    <button onclick="addComplaint()">Submit</button>
</div>

<!-- 🔍 Search -->
<input id="search" placeholder="Search complaints..." onkeyup="searchComplaint()">

<!-- 📋 Complaint List -->
<div id="list"></div>

<script src="storage.js"></script>
<script src="script.js"></script>

</body>
</html>
